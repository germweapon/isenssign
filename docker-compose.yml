services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.production
    environment:
      DATABASE_URL: "postgresql://isenssign:${DB_PASSWORD:-changeme}@db:5432/isenssign?schema=public"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    networks:
      - isenssign

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: isenssign
      POSTGRES_USER: isenssign
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isenssign -d isenssign"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isenssign

volumes:
  pgdata:
  uploads:

networks:
  isenssign:
    driver: bridge
